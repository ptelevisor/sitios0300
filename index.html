<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Prueba - Tasker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        #app {
            width: 100%;
            max-width: 1080px;
            height: 100vh;
            max-height: 2340px;
            /* Altura exacta del A34 */
            background: white;
            position: relative;
            overflow: hidden;
        }

        /* Fondo decorativo */
        #app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
            z-index: 0;
        }

        /* Contenido superior */
        .header {
            position: absolute;
            top: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 26px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
        }

        .github-badge {
            display: inline-block;
            background: #24292e;
            color: white;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 10px;
            margin-bottom: 6px;
        }

        /* === BOTÓN 1: CENTRO EXACTO EN (550, 750) para A34 === */
        #btn-prueba {
            position: absolute;
            left: 550px;
            top: 750px;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        #btn-prueba:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #btn-prueba:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(-50%, -50%) scale(0.98);
        }

        /* === BOTÓN 2: CENTRO EXACTO EN (550, 1900) para A34 === */
        #btn-agendar {
            position: absolute;
            left: 550px;
            top: 1900px;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 60px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            transition: all 0.5s ease;
            letter-spacing: 0.5px;
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 10;
        }

        #btn-agendar.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #btn-agendar:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #btn-agendar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* === Botón enviar notificación === */
        #btn-enviar-notif {
            position: absolute;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 5;
        }

        #btn-enviar-notif:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* === Estado de notificación === */
        #notification-status {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #888;
            background: #f8f9fa;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #e9ecef;
            z-index: 5;
            white-space: nowrap;
        }

        #notification-status .highlight {
            color: #667eea;
            font-weight: 600;
        }

        /* === Log === */
        #log {
            position: absolute;
            bottom: 190px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #999;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 14px;
            border-radius: 12px;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid #f1f3f5;
            z-index: 5;
        }

        /* === Coordenadas de referencia === */
        .coord-info {
            position: absolute;
            font-size: 11px;
            color: #adb5bd;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.85);
            padding: 2px 10px;
            border-radius: 10px;
            border: 1px dashed #dee2e6;
            z-index: 1;
            font-weight: 500;
        }

        .coord-info.top {
            left: 550px;
            top: 750px;
            transform: translate(-50%, -50%);
            margin-top: -45px;
        }

        .coord-info.bottom {
            left: 550px;
            top: 1900px;
            transform: translate(-50%, -50%);
            margin-top: -45px;
        }

        /* === Líneas guía === */
        .guide-line {
            position: absolute;
            background: rgba(255, 0, 0, 0.08);
            pointer-events: none;
            z-index: 0;
        }

        .guide-line.horizontal {
            left: 0;
            right: 0;
            height: 1px;
            border-top: 1px dashed rgba(255, 0, 0, 0.25);
        }

        .guide-line.vertical {
            top: 0;
            bottom: 0;
            width: 1px;
            border-left: 1px dashed rgba(255, 0, 0, 0.25);
        }

        /* === Puntos marcadores === */
        .coord-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background: rgba(255, 0, 0, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            border: 2px solid rgba(255, 0, 0, 0.7);
        }

        .coord-dot.top {
            left: 550px;
            top: 750px;
        }

        .coord-dot.bottom {
            left: 550px;
            top: 1900px;
        }

        /* Responsive */
        @media (max-width: 1080px) {
            #app {
                max-width: 100vw;
                max-height: 100vh;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- Líneas guía -->
        <div class="guide-line horizontal" style="top:750px;"></div>
        <div class="guide-line horizontal" style="top:1900px;"></div>
        <div class="guide-line vertical" style="left:550px;"></div>

        <!-- Puntos marcadores -->
        <div class="coord-dot top"></div>
        <div class="coord-dot bottom"></div>

        <!-- Header -->
        <div class="header">
            <span class="github-badge">📦 Samsung A34</span>
            <h1>🧪 PWA de Prueba</h1>
            <p class="subtitle">Coordenadas exactas para Tasker</p>
        </div>

        <!-- Botón 1 -->
        <button id="btn-prueba">🎯 Prueba 100 puntos</button>

        <!-- Botón 2 -->
        <button id="btn-agendar">📅 Agendar</button>

        <!-- Botón enviar notificación -->
        <button id="btn-enviar-notif">📨 Enviar "soy un gato"</button>

        <!-- Estado -->
        <div id="notification-status">
            📨 Notificación: <span class="highlight" id="notif-text">Esperando...</span>
        </div>

        <!-- Log -->
        <div id="log">💡 Listo para recibir notificaciones</div>

        <!-- Coordenadas -->
        <div class="coord-info top">🎯 (550, 750)</div>
        <div class="coord-info bottom">🎯 (550, 1900)</div>
    </div>

    <script>
        // ============================================================
        // 1. REGISTRAR SERVICE WORKER
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('✅ SW registrado:', reg);
                    updateLog('✅ Service Worker listo');
                })
                .catch(err => {
                    console.error('❌ Error SW:', err);
                    updateLog('❌ Error al registrar SW');
                });
        }

        // ============================================================
        // 2. SOLICITAR PERMISO DE NOTIFICACIONES
        // ============================================================
        if ('Notification' in window && 'serviceWorker' in navigator) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    updateLog('🔔 Permiso concedido');
                    document.getElementById('notif-text').textContent = '✅ Listo';
                } else {
                    updateLog('⚠️ Permiso denegado');
                    document.getElementById('notif-text').textContent = '🚫 Bloqueado';
                }
            });
        }

        // ============================================================
        // 3. ESCUCHAR NOTIFICACIONES
        // ============================================================
        navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'NOTIFICATION_RECEIVED') {
                const text = event.data.text || 'sin texto';
                document.getElementById('notif-text').textContent = `"${text}"`;
                updateLog(`📨 Notificación: "${text}"`);

                if (text === 'soy un gato') {
                    updateLog('🐱 ¡Coincide! Clic en "Prueba 100 puntos"');
                    document.getElementById('btn-prueba').click();
                }
            }
        });

        // ============================================================
        // 4. LÓGICA DE BOTONES
        // ============================================================
        const btnPrueba = document.getElementById('btn-prueba');
        const btnAgendar = document.getElementById('btn-agendar');
        const btnEnviar = document.getElementById('btn-enviar-notif');

        btnPrueba.addEventListener('click', function() {
            updateLog('🖱️ Clic en (550, 750)');
            this.disabled = true;
            this.textContent = '⏳ Cargando...';

            setTimeout(() => {
                btnAgendar.classList.add('visible');
                updateLog('✅ Botón "Agendar" visible en (550, 1900)');
                this.disabled = false;
                this.textContent = '🎯 Prueba 100 puntos';
            }, 3000);
        });

        btnAgendar.addEventListener('click', function() {
            updateLog('🖱️ Clic en (550, 1900) → ¡AGENDADO! 🎉');
            this.textContent = '✅ ¡Agendado!';
            this.style.background = 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
            this.disabled = true;
            setTimeout(() => {
                updateLog('🎉 Proceso completado');
            }, 500);
        });

        btnEnviar.addEventListener('click', function() {
            enviarNotificacion('soy un gato');
        });

        // ============================================================
        // 5. FUNCIONES
        // ============================================================
        function updateLog(message) {
            const logEl = document.getElementById('log');
            logEl.textContent = '💡 ' + message;
            console.log('[PWA]', message);
        }

        function enviarNotificacion(texto = 'soy un gato') {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'TEST_NOTIFICATION',
                    text: texto
                });
                updateLog(`📤 Enviando: "${texto}"`);
            } else {
                updateLog('❌ SW no activo. Recarga.');
            }
        }

        window.enviarNotificacion = enviarNotificacion;

        console.log('📱 Resolución:', window.innerWidth, 'x', window.innerHeight);
        console.log('🎯 Coordenadas: (550,750) y (550,1900)');
        console.log('💡 Para probar: enviarNotificacion("soy un gato")');
    </script>

</body>

</html>
