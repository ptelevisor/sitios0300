<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Prueba - Tasker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Contenedor: OCUPA TODA LA PANTALLA */
        #app {
            width: 100vw;
            height: 100vh;
            background: white;
            position: relative;
            overflow: hidden;
        }

        /* ============================================================ */
        /* HEADER */
        /* ============================================================ */

        .header {
            text-align: center;
            padding: 20px 20px 0 20px;
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 24px;
            color: #1a1a2e;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
        }

        .device-badge {
            display: inline-block;
            background: #24292e;
            color: white;
            padding: 2px 14px;
            border-radius: 12px;
            font-size: 11px;
            margin-bottom: 4px;
        }

        /* ============================================================ */
        /* LÍNEAS GUÍA - COORDENADAS ABSOLUTAS */
        /* ============================================================ */

        /* Línea vertical en X = 550 */
        .guide-line-vertical {
            position: absolute;
            left: 550px;
            top: 0;
            bottom: 0;
            width: 0;
            border-left: 2px dashed rgba(255, 0, 0, 0.5);
            pointer-events: none;
            z-index: 2;
        }

        /* Línea horizontal en Y = 750 */
        .guide-line-horizontal-1 {
            position: absolute;
            left: 0;
            right: 0;
            top: 750px;
            height: 0;
            border-top: 2px dashed rgba(255, 0, 0, 0.5);
            pointer-events: none;
            z-index: 2;
        }

        /* Línea horizontal en Y = 1900 */
        .guide-line-horizontal-2 {
            position: absolute;
            left: 0;
            right: 0;
            top: 1900px;
            height: 0;
            border-top: 2px dashed rgba(255, 0, 0, 0.5);
            pointer-events: none;
            z-index: 2;
        }

        /* Etiquetas de las líneas */
        .guide-label {
            position: absolute;
            font-size: 12px;
            color: #dc3545;
            background: rgba(255, 255, 255, 0.95);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid rgba(220, 53, 69, 0.3);
            pointer-events: none;
            z-index: 3;
            font-weight: bold;
        }

        .guide-label-vertical {
            left: 550px;
            top: 10px;
            transform: translateX(-50%);
        }

        .guide-label-h1 {
            left: 10px;
            top: 750px;
            transform: translateY(-50%);
        }

        .guide-label-h2 {
            left: 10px;
            top: 1900px;
            transform: translateY(-50%);
        }

        /* ============================================================ */
        /* PUNTOS ROJOS - COORDENADAS ABSOLUTAS */
        /* ============================================================ */

        .dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(255, 0, 0, 0.4);
            border: 2px solid #dc3545;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 3;
        }

        .dot-1 {
            left: 550px;
            top: 750px;
        }

        .dot-2 {
            left: 550px;
            top: 1900px;
        }

        /* ============================================================ */
        /* ETIQUETAS DE COORDENADAS */
        /* ============================================================ */

        .label {
            position: absolute;
            font-size: 13px;
            color: #495057;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 14px;
            border-radius: 10px;
            border: 1px solid #dee2e6;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 3;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .label-1 {
            left: 550px;
            top: 690px;
        }

        .label-2 {
            left: 550px;
            top: 1840px;
        }

        /* ============================================================ */
        /* BOTONES - COORDENADAS ABSOLUTAS */
        /* ============================================================ */

        /* Botón 1: Centro EXACTO en (550, 750) */
        #btn-prueba {
            position: absolute;
            left: 550px;
            top: 750px;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            z-index: 10;
            transition: all 0.3s;
        }

        #btn-prueba:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #btn-prueba:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Botón 2: Centro EXACTO en (550, 1900) */
        #btn-agendar {
            position: absolute;
            left: 550px;
            top: 1900px;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 70px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            z-index: 10;
            transition: all 0.5s;
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -50%) scale(0.8);
        }

        #btn-agendar.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #btn-agendar:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #btn-agendar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============================================================ */
        /* BOTÓN ENVIAR NOTIFICACIÓN */
        /* ============================================================ */

        #btn-enviar {
            position: absolute;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        #btn-enviar:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* ============================================================ */
        /* ESTADO Y LOG */
        /* ============================================================ */

        #status {
            position: absolute;
            left: 50%;
            bottom: 90px;
            transform: translateX(-50%);
            font-size: 14px;
            color: #666;
            background: #f8f9fa;
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid #e9ecef;
            z-index: 5;
            white-space: nowrap;
        }

        #status span {
            color: #667eea;
            font-weight: bold;
        }

        #log {
            position: absolute;
            left: 50%;
            bottom: 140px;
            transform: translateX(-50%);
            font-size: 11px;
            color: #999;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 16px;
            border-radius: 12px;
            z-index: 5;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- ============================================================ -->
        <!-- LÍNEAS GUÍA -->
        <!-- ============================================================ -->

        <div class="guide-line-vertical"></div>
        <div class="guide-label guide-label-vertical">⬇ X = 550</div>

        <div class="guide-line-horizontal-1"></div>
        <div class="guide-label guide-label-h1">➡ Y = 750</div>

        <div class="guide-line-horizontal-2"></div>
        <div class="guide-label guide-label-h2">➡ Y = 1900</div>

        <!-- ============================================================ -->
        <!-- PUNTOS ROJOS -->
        <!-- ============================================================ -->

        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>

        <!-- ============================================================ -->
        <!-- ETIQUETAS -->
        <!-- ============================================================ -->

        <div class="label label-1">🎯 (550, 750)</div>
        <div class="label label-2">🎯 (550, 1900)</div>

        <!-- ============================================================ -->
        <!-- HEADER -->
        <!-- ============================================================ -->

        <div class="header">
            <span class="device-badge">📱 Samsung A34</span>
            <h1>🧪 PWA Prueba Tasker</h1>
            <p class="subtitle">Centros EXACTOS: (550, 750) y (550, 1900)</p>
        </div>

        <!-- ============================================================ -->
        <!-- BOTONES -->
        <!-- ============================================================ -->

        <button id="btn-prueba">🎯 Prueba 100 puntos</button>
        <button id="btn-agendar">📅 Agendar</button>
        <button id="btn-enviar">📨 Enviar "soy un gato"</button>

        <!-- ============================================================ -->
        <!-- ESTADO Y LOG -->
        <!-- ============================================================ -->

        <div id="status">📨 Notificación: <span id="notif-text">Esperando...</span></div>
        <div id="log">💡 Listo</div>

    </div>

    <script>
        // ============================================================
        // REGISTRAR SERVICE WORKER
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => log('✅ Service Worker listo'))
                .catch(() => log('❌ Error SW'));
        }

        // ============================================================
        // PERMISO DE NOTIFICACIONES
        // ============================================================
        if ('Notification' in window) {
            Notification.requestPermission().then(p => {
                if (p === 'granted') {
                    document.getElementById('notif-text').textContent = '✅ Listo';
                    log('🔔 Permiso concedido');
                } else {
                    document.getElementById('notif-text').textContent = '🚫 Bloqueado';
                    log('⚠️ Permiso denegado');
                }
            });
        }

        // ============================================================
        // ESCUCHAR NOTIFICACIONES DEL SW
        // ============================================================
        navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'NOTIFICATION_RECEIVED') {
                const text = event.data.text || 'sin texto';
                document.getElementById('notif-text').textContent = `"${text}"`;
                log(`📨 Notificación: "${text}"`);

                if (text === 'soy un gato') {
                    log('🐱 ¡Coincide! Clic en "Prueba 100 puntos"');
                    document.getElementById('btn-prueba').click();
                }
            }
        });

        // ============================================================
        // LÓGICA DE BOTONES
        // ============================================================
        const btnPrueba = document.getElementById('btn-prueba');
        const btnAgendar = document.getElementById('btn-agendar');
        const btnEnviar = document.getElementById('btn-enviar');

        btnPrueba.addEventListener('click', function() {
            log('🖱️ Clic en (550, 750)');
            this.disabled = true;
            this.textContent = '⏳ Cargando...';

            setTimeout(() => {
                btnAgendar.classList.add('visible');
                log('✅ Botón "Agendar" visible (550, 1900)');
                this.disabled = false;
                this.textContent = '🎯 Prueba 100 puntos';
            }, 3000);
        });

        btnAgendar.addEventListener('click', function() {
            log('🖱️ Clic en (550, 1900) → ¡AGENDADO! 🎉');
            this.textContent = '✅ ¡Agendado!';
            this.style.background = 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
            this.disabled = true;
            setTimeout(() => log('🎉 Proceso completado'), 500);
        });

        btnEnviar.addEventListener('click', function() {
            enviarNotificacion('soy un gato');
        });

        // ============================================================
        // FUNCIONES
        // ============================================================
        function log(msg) {
            const el = document.getElementById('log');
            el.textContent = '💡 ' + msg;
            console.log('[PWA]', msg);
        }

        function enviarNotificacion(texto = 'soy un gato') {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'TEST_NOTIFICATION',
                    text: texto
                });
                log(`📤 Enviando: "${texto}"`);
            } else {
                log('❌ SW no activo. Recarga.');
            }
        }

        window.enviarNotificacion = enviarNotificacion;

        // Información de depuración
        console.log('📱 Resolución real:', window.innerWidth, 'x', window.innerHeight);
        console.log('🎯 Coordenadas EXACTAS: (550, 750) y (550, 1900)');
        console.log('💡 Para probar: enviarNotificacion("soy un gato")');
    </script>

</body>
</html>
