<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Prueba - Tasker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Sin scroll */
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* === CONTENEDOR PRINCIPAL: OCUPA TODA LA PANTALLA === */
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Ocupa toda la pantalla */
            max-width: 1080px;
            max-height: 2340px;
            /* Límites para A34 */
            background: white;
            margin: 0 auto;
            overflow: hidden;
        }

        /* Fondo decorativo */
        #app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
            z-index: 0;
        }

        /* === HEADER (títulos) === */
        .header {
            position: absolute;
            top: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
            padding: 0 20px;
        }

        h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
        }

        .github-badge {
            display: inline-block;
            background: #24292e;
            color: white;
            padding: 2px 14px;
            border-radius: 12px;
            font-size: 10px;
            margin-bottom: 4px;
        }

        /* === BOTÓN 1: ANCHO CASI COMPLETO, CENTRO EN (550, 750) === */
        #btn-prueba {
            position: absolute;
            /* Centro exacto en (550, 750) */
            left: 550px;
            top: 750px;
            transform: translate(-50%, -50%);
            /* Ancho: 90% de la pantalla (1080 * 0.9 = 972px) */
            width: 90%;
            max-width: 972px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            z-index: 10;
            text-align: center;
        }

        #btn-prueba:active {
            transform: translate(-50%, -50%) scale(0.97);
        }

        #btn-prueba:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(-50%, -50%) scale(0.98);
        }

        /* === BOTÓN 2: ANCHO CASI COMPLETO, CENTRO EN (550, 1900) === */
        #btn-agendar {
            position: absolute;
            /* Centro exacto en (550, 1900) */
            left: 550px;
            top: 1900px;
            transform: translate(-50%, -50%);
            /* Ancho: 90% de la pantalla */
            width: 90%;
            max-width: 972px;
            height: 70px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
            transition: all 0.5s ease;
            letter-spacing: 0.5px;
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 10;
            text-align: center;
        }

        #btn-agendar.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #btn-agendar:active {
            transform: translate(-50%, -50%) scale(0.97);
        }

        #btn-agendar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* === Botón "Enviar notificación" (abajo) === */
        #btn-enviar-notif {
            position: absolute;
            left: 50%;
            bottom: 60px;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 5;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        #btn-enviar-notif:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* === Estado de notificación === */
        #notification-status {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #888;
            background: #f8f9fa;
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid #e9ecef;
            z-index: 5;
            white-space: nowrap;
        }

        #notification-status .highlight {
            color: #667eea;
            font-weight: 600;
        }

        /* === Log === */
        #log {
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #999;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 16px;
            border-radius: 12px;
            max-width: 92%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid #f1f3f5;
            z-index: 5;
        }

        /* === ETIQUETAS DE COORDENADAS === */
        .coord-info {
            position: absolute;
            font-size: 12px;
            color: #6c757d;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 2px 12px;
            border-radius: 10px;
            border: 1px dashed #adb5bd;
            z-index: 1;
            font-weight: 500;
        }

        .coord-info.top {
            left: 550px;
            top: 750px;
            transform: translate(-50%, -50%);
            margin-top: -55px;
        }

        .coord-info.bottom {
            left: 550px;
            top: 1900px;
            transform: translate(-50%, -50%);
            margin-top: -55px;
        }

        /* === LÍNEAS GUÍA === */
        .guide-line {
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }

        .guide-line.horizontal {
            left: 0;
            right: 0;
            height: 1px;
            border-top: 1px dashed rgba(255, 0, 0, 0.3);
        }

        .guide-line.vertical {
            top: 0;
            bottom: 0;
            width: 1px;
            border-left: 1px dashed rgba(255, 0, 0, 0.3);
        }

        /* === PUNTOS MARCADORES === */
        .coord-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(255, 0, 0, 0.35);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            border: 2px solid rgba(255, 0, 0, 0.7);
        }

        .coord-dot.top {
            left: 550px;
            top: 750px;
        }

        .coord-dot.bottom {
            left: 550px;
            top: 1900px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 500px) {
            #btn-prueba,
            #btn-agendar {
                height: 56px;
                font-size: 16px;
                border-radius: 12px;
                width: 92%;
            }

            .coord-info {
                font-size: 10px;
                padding: 1px 8px;
            }

            .coord-info.top {
                margin-top: -45px;
            }
            .coord-info.bottom {
                margin-top: -45px;
            }

            #btn-enviar-notif {
                padding: 10px 20px;
                font-size: 13px;
                bottom: 40px;
            }

            #notification-status {
                bottom: 100px;
                font-size: 11px;
                padding: 4px 14px;
            }

            #log {
                bottom: 145px;
                font-size: 10px;
                padding: 3px 12px;
            }

            h1 {
                font-size: 20px;
            }
            .subtitle {
                font-size: 11px;
            }
        }

        /* Para pantallas muy pequeñas */
        @media (max-width: 380px) {
            #btn-prueba,
            #btn-agendar {
                height: 48px;
                font-size: 14px;
                width: 94%;
            }

            .coord-dot {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- LÍNEAS GUÍA (solo para referencia visual) -->
        <div class="guide-line horizontal" style="top:750px;"></div>
        <div class="guide-line horizontal" style="top:1900px;"></div>
        <div class="guide-line vertical" style="left:550px;"></div>

        <!-- PUNTOS MARCADORES -->
        <div class="coord-dot top"></div>
        <div class="coord-dot bottom"></div>

        <!-- HEADER -->
        <div class="header">
            <span class="github-badge">📱 Samsung A34</span>
            <h1>🧪 PWA de Prueba</h1>
            <p class="subtitle">Centros exactos: (550,750) y (550,1900)</p>
        </div>

        <!-- BOTÓN 1: Centro en (550, 750) -->
        <button id="btn-prueba">🎯 Prueba 100 puntos</button>

        <!-- BOTÓN 2: Centro en (550, 1900) -->
        <button id="btn-agendar">📅 Agendar</button>

        <!-- BOTÓN ENVIAR NOTIFICACIÓN -->
        <button id="btn-enviar-notif">📨 Enviar "soy un gato"</button>

        <!-- ESTADO -->
        <div id="notification-status">
            📨 Notificación: <span class="highlight" id="notif-text">Esperando...</span>
        </div>

        <!-- LOG -->
        <div id="log">💡 Listo para recibir notificaciones</div>

        <!-- ETIQUETAS DE COORDENADAS -->
        <div class="coord-info top">🎯 Centro (550, 750)</div>
        <div class="coord-info bottom">🎯 Centro (550, 1900)</div>
    </div>

    <script>
        // ============================================================
        // 1. REGISTRAR SERVICE WORKER
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('✅ SW registrado:', reg);
                    updateLog('✅ Service Worker listo');
                })
                .catch(err => {
                    console.error('❌ Error SW:', err);
                    updateLog('❌ Error al registrar SW');
                });
        }

        // ============================================================
        // 2. SOLICITAR PERMISO DE NOTIFICACIONES
        // ============================================================
        if ('Notification' in window && 'serviceWorker' in navigator) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    updateLog('🔔 Permiso concedido');
                    document.getElementById('notif-text').textContent = '✅ Listo';
                } else {
                    updateLog('⚠️ Permiso denegado');
                    document.getElementById('notif-text').textContent = '🚫 Bloqueado';
                }
            });
        }

        // ============================================================
        // 3. ESCUCHAR NOTIFICACIONES
        // ============================================================
        navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'NOTIFICATION_RECEIVED') {
                const text = event.data.text || 'sin texto';
                document.getElementById('notif-text').textContent = `"${text}"`;
                updateLog(`📨 Notificación: "${text}"`);

                if (text === 'soy un gato') {
                    updateLog('🐱 ¡Texto coincide! Clic en "Prueba 100 puntos"');
                    document.getElementById('btn-prueba').click();
                }
            }
        });

        // ============================================================
        // 4. LÓGICA DE BOTONES
        // ============================================================
        const btnPrueba = document.getElementById('btn-prueba');
        const btnAgendar = document.getElementById('btn-agendar');
        const btnEnviar = document.getElementById('btn-enviar-notif');

        // Botón "Prueba 100 puntos"
        btnPrueba.addEventListener('click', function() {
            updateLog('🖱️ Clic en "Prueba 100 puntos" (550, 750)');
            this.disabled = true;
            this.textContent = '⏳ Cargando...';

            setTimeout(() => {
                btnAgendar.classList.add('visible');
                updateLog('✅ Botón "Agendar" visible (550, 1900)');
                this.disabled = false;
                this.textContent = '🎯 Prueba 100 puntos';
            }, 3000);
        });

        // Botón "Agendar"
        btnAgendar.addEventListener('click', function() {
            updateLog('🖱️ Clic en "Agendar" (550, 1900) → ¡AGENDADO! 🎉');
            this.textContent = '✅ ¡Agendado!';
            this.style.background = 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
            this.style.boxShadow = '0 6px 20px rgba(67, 233, 123, 0.4)';
            this.disabled = true;
            setTimeout(() => {
                updateLog('🎉 Proceso completado con éxito');
            }, 500);
        });

        // Botón "Enviar notificación"
        btnEnviar.addEventListener('click', function() {
            enviarNotificacion('soy un gato');
        });

        // ============================================================
        // 5. FUNCIONES
        // ============================================================
        function updateLog(message) {
            const logEl = document.getElementById('log');
            logEl.textContent = '💡 ' + message;
            console.log('[PWA]', message);
        }

        function enviarNotificacion(texto = 'soy un gato') {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'TEST_NOTIFICATION',
                    text: texto
                });
                updateLog(`📤 Enviando: "${texto}"`);
            } else {
                updateLog('❌ SW no activo. Recarga la página.');
                // Reintentar
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js')
                        .then(() => {
                            setTimeout(() => {
                                if (navigator.serviceWorker.controller) {
                                    navigator.serviceWorker.controller.postMessage({
                                        type: 'TEST_NOTIFICATION',
                                        text: texto
                                    });
                                    updateLog(`📤 Reintentando envío: "${texto}"`);
                                }
                            }, 1500);
                        });
                }
            }
        }

        // Exponer función global
        window.enviarNotificacion = enviarNotificacion;

        // Información de depuración
        console.log('📱 Resolución:', window.innerWidth, 'x', window.innerHeight);
        console.log('🎯 Coordenadas: (550, 750) y (550, 1900)');
        console.log('💡 Para probar: enviarNotificacion("soy un gato")');
        console.log('📏 Ancho de botones:', Math.round(window.innerWidth * 0.9), 'px');
    </script>

</body>

</html>
