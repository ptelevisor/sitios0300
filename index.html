<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Prueba - Tasker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 30px 20px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
            min-height: 600px;
        }

        h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* === Botón 1: centro en 550,750 (en una pantalla de 1080x2400) === */
        #btn-prueba {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            /* En una pantalla 1080x2400, el centro en 550,750 */
            /* Pero como usamos %, simulamos la posición relativa */
            width: 200px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        #btn-prueba:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #btn-prueba:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(-50%, -50%) scale(0.98);
        }

        /* === Botón 2: centro en 550,1900 (en una pantalla de 1080x2400) === */
        #btn-agendar {
            position: absolute;
            left: 50%;
            top: 79%;
            /* 1900/2400 ≈ 0.7916 → 79% */
            transform: translate(-50%, -50%);
            width: 200px;
            height: 60px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            transition: all 0.5s ease;
            letter-spacing: 0.5px;
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 10;
        }

        #btn-agendar.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #btn-agendar:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        /* === Estado de la notificación === */
        #notification-status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #888;
            background: #f8f9fa;
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
        }

        #notification-status .highlight {
            color: #667eea;
            font-weight: 600;
        }

        /* === Log de actividad === */
        #log {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #999;
            background: rgba(0, 0, 0, 0.05);
            padding: 6px 14px;
            border-radius: 12px;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* === Coordenadas de referencia === */
        .coord-info {
            position: absolute;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
        }

        .coord-info.top {
            top: 5px;
            right: 10px;
        }

        .coord-info.bottom {
            bottom: 50px;
            right: 10px;
        }

        /* Responsive: ajuste para pantallas más pequeñas */
        @media (max-width: 500px) {
            #app {
                min-height: 500px;
                padding: 20px 15px 30px;
            }

            #btn-prueba,
            #btn-agendar {
                width: 160px;
                height: 50px;
                font-size: 15px;
            }

            #btn-agendar {
                top: 76%;
                /* Ajuste para pantallas más pequeñas */
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <h1>🧪 PWA de Prueba</h1>
        <p class="subtitle">Simulación para Tasker + AutoInput</p>

        <!-- Botón 1: Centro en 550,750 -->
        <button id="btn-prueba">🎯 Prueba 100 puntos</button>

        <!-- Botón 2: Centro en 550,1900 -->
        <button id="btn-agendar">📅 Agendar</button>

        <!-- Estado de notificación -->
        <div id="notification-status">
            📨 Notificación: <span class="highlight" id="notif-text">Esperando...</span>
        </div>

        <!-- Log de actividad -->
        <div id="log">💡 Listo para recibir notificaciones</div>

        <!-- Referencias de coordenadas (solo informativo) -->
        <div class="coord-info top">📐 550,750</div>
        <div class="coord-info bottom">📐 550,1900</div>
    </div>

    <script>
        // ============================================================
        // 1. REGISTRAR SERVICE WORKER
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('✅ SW registrado:', reg);
                    updateLog('✅ Service Worker listo');
                })
                .catch(err => {
                    console.error('❌ Error SW:', err);
                    updateLog('❌ Error al registrar SW');
                });
        }

        // ============================================================
        // 2. SOLICITAR PERMISO DE NOTIFICACIONES
        // ============================================================
        if ('Notification' in window && 'serviceWorker' in navigator) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    updateLog('🔔 Permiso de notificaciones concedido');
                    document.getElementById('notif-text').textContent = '✅ Listo';
                } else {
                    updateLog('⚠️ Permiso de notificaciones denegado');
                    document.getElementById('notif-text').textContent = '🚫 Bloqueado';
                }
            });
        }

        // ============================================================
        // 3. ESCUCHAR NOTIFICACIONES (desde el Service Worker)
        // ============================================================
        // Escuchamos mensajes del SW cuando se recibe una notificación
        navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'NOTIFICATION_RECEIVED') {
                const text = event.data.text || 'sin texto';
                document.getElementById('notif-text').textContent = `"${text}"`;
                updateLog(`📨 Notificación recibida: "${text}"`);

                // Si el texto es "soy el gato", simulamos el clic en el botón de prueba
                if (text === 'soy el gato') {
                    updateLog('🐱 ¡Texto coincide! Simulando clic en "Prueba 100 puntos"');
                    // Simulamos el clic en el botón de prueba
                    document.getElementById('btn-prueba').click();
                }
            }
        });

        // ============================================================
        // 4. LÓGICA DE LOS BOTONES
        // ============================================================
        const btnPrueba = document.getElementById('btn-prueba');
        const btnAgendar = document.getElementById('btn-agendar');
        let agendarVisible = false;

        // Botón "Prueba 100 puntos"
        btnPrueba.addEventListener('click', function (e) {
            updateLog('🖱️ Clic en "Prueba 100 puntos" (550,750)');

            // Deshabilitamos el botón temporalmente
            this.disabled = true;
            this.textContent = '⏳ Cargando...';

            // Mostramos el botón "Agendar" después de 3 segundos
            setTimeout(() => {
                btnAgendar.classList.add('visible');
                agendarVisible = true;
                updateLog('✅ Botón "Agendar" visible en (550,1900)');

                // Restauramos el botón de prueba
                this.disabled = false;
                this.textContent = '🎯 Prueba 100 puntos';
            }, 3000);
        });

        // Botón "Agendar"
        btnAgendar.addEventListener('click', function (e) {
            updateLog('🖱️ Clic en "Agendar" (550,1900) → ¡AGENDADO! 🎉');
            this.textContent = '✅ ¡Agendado!';
            this.style.background = 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
            this.style.boxShadow = '0 4px 15px rgba(67, 233, 123, 0.4)';
            this.disabled = true;

            // Mostramos un mensaje de éxito
            setTimeout(() => {
                updateLog('🎉 Proceso completado con éxito');
            }, 500);
        });

        // ============================================================
        // 5. FUNCIONES DE UTILIDAD
        // ============================================================
        function updateLog(message) {
            const logEl = document.getElementById('log');
            logEl.textContent = '💡 ' + message;
            console.log('[PWA]', message);
        }

        // ============================================================
        // 6. ENVÍO DE NOTIFICACIÓN DE PRUEBA (desde la consola)
        // ============================================================
        // Función global para probar desde la consola del navegador
        window.enviarNotificacion = function (texto = 'soy el gato') {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'TEST_NOTIFICATION',
                    text: texto
                });
                updateLog(`📤 Enviando notificación de prueba: "${texto}"`);
            } else {
                updateLog('❌ No hay SW activo. Recarga la página.');
            }
        };

        // También podemos enviar desde el propio SW si está activo
        console.log('💡 Para probar, escribe en consola: enviarNotificacion("soy el gato")');
        console.log('💡 O también: enviarNotificacion("otro texto")');
    </script>

</body>

</html>
